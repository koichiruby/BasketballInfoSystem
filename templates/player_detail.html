<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球员详情</title>
</head>
<body>
    <h1>球员详情</h1>

    <p><strong>PlayerID:</strong> {{ player['PlayerID'] }}</p>
    <p><strong>Name:</strong> {{ player['Name'] }}</p>
    <p><strong>TeamID:</strong> {{ player['TeamID'] }}</p>
    <p><strong>Number:</strong> {{ player['Number'] }}</p>
    <p><strong>Position:</strong> {{ player['Position'] }}</p>

    <!-- 修改和删除按钮 -->
    <a href="{{ url_for('edit_player', player_id=player['PlayerID']) }}" class="btn">修改球员信息</a>
    <form action="{{ url_for('delete_player', player_id=player['PlayerID']) }}" method="POST" style="display:inline;">
        <button type="submit" class="btn btn-danger">删除球员</button>
    </form>

    <!-- 返回按钮 -->
    <a href="{{ url_for('manage_players') }}" class="btn">返回球员列表</a>
</body>
</html>
