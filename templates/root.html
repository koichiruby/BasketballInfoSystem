<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}篮球信息系统{% endblock %}</title>
  <style>
    body {
      background: url("{{ url_for('static', filename='images/background.jpg') }}") no-repeat center center fixed;
      background-size: cover; /* 让图片铺满页面 */
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    h1 {
      color: white;
      text-align: center;
      font-size: 3em;
      margin-top: 15%;
    }
    .button {
      background-color: #ff9f43;
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: block;
      font-size: 16px;
      margin: 50px auto;
      border-radius: 10px;
      transition: background-color 1s ease, border-radius 1s ease;
      width: 150px;
      cursor: pointer;
    }
    .button:hover {
      background-color: #2998ff;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <h1>球员信息管理系统</h1>
  <button class="button" onclick="location.href='http://127.0.0.1:5000/login'">管理员登录</button>
</body>
</html>
