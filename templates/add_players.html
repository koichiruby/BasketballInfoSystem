<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>添加球员</title>
  <style>
    .message {
      font-size: 16px;
      padding: 10px;
      margin-top: 20px;
      border-radius: 5px;
    }
    .success {
      background-color: #28a745;
      color: white;
    }
    .error {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>
<body>
  <h1>添加球员</h1>
  <form method="POST" action="{{ url_for('add_player') }}">
    <label for="PlayerID">PlayerID:</label><br>
    <input type="text" id="PlayerID" name="PlayerID" required><br><br>

    <label for="Name">Name:</label><br>
    <input type="text" id="Name" name="Name" required><br><br>

    <label for="TeamID">TeamID:</label><br>
    <input type="text" id="TeamID" name="TeamID" required><br><br>

    <label for="Number">Number:</label><br>
    <input type="text" id="Number" name="Number" required><br><br>

    <label for="Position">Position:</label><br>
    <input type="text" id="Position" name="Position" required><br><br>

    <button type="submit">提交</button>
  </form>

  {% if message %}
  <div class="message {{ message.type }}">
    {{ message.text }}
  </div>
  {% endif %}
    <!-- 返回按钮 -->
    <a href="{{ url_for('manage_players') }}" class="btn">返回球员列表</a>
</body>
</html>
